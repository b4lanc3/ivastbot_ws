controller_manager:
  ros__parameters:
    update_rate: 100  # Hz — read()/write() cycle rate

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    drivetrain_controller:
      type: diff_drive_controller/DiffDriveController

drivetrain_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # Measured from SolidWorks URDF: |0.11438 - (-0.10889)| = 0.22327 m
    # TODO: Đo lại bằng thước cho chính xác!
    wheel_separation: 0.22327   # Khoảng cách tâm 2 bánh chủ động (m)
    # TODO: Đo bán kính bánh xe thực tế bằng thước kẹp!
    wheel_radius: 0.085         # Bán kính bánh xe (m) — ước tính từ URDF

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 100.0          # Odometry publish rate (Hz)
    odom_frame_id: odom
    base_frame_id: base_link

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false            # Use encoder feedback
    position_feedback: false    # Use velocity feedback
    enable_odom_tf: true        # Publish odom -> base_footprint TF

    cmd_vel_timeout: 0.5        # Stop if no cmd_vel for 0.5s
    use_stamped_vel: false      # Accept Twist (not TwistStamped)

    # Velocity limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity: 1.5
    linear.x.min_velocity: -1.5
    linear.x.max_acceleration: 2.0
    linear.x.min_acceleration: -2.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity: 2.2
    angular.z.min_velocity: -2.2
    angular.z.max_acceleration: 1.8
    angular.z.min_acceleration: -1.8
